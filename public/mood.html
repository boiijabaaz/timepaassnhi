

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mood Tracker & Refresh</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(135deg, #6ee7b7, #3b82f6);
}
.glass {
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(20px);
  border-radius: 20px;
}
.game-button {
  transition: all 0.3s ease;
}
.game-button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(0,0,0,0.2);
}
.color-box {
  cursor: pointer;
  transition: transform 0.1s;
}
.color-box:hover {
  transform: scale(0.9);
}
#gameArea {
  display: none;
}
.hidden {
  display: none;
}
</style>

</head>

<body class="p-4 md:p-6 max-w-6xl mx-auto">

<!-- Mood Tracker Section -->
<div class="glass p-6 text-center mb-6">

<h1 class="text-2xl md:text-4xl font-bold mb-6">Mood Tracker</h1>

<div class="text-4xl md:text-6xl space-x-4 mb-4">
  <button onclick="setMood(1)">😡</button>
  <button onclick="setMood(2)">😞</button>
  <button onclick="setMood(3)">😐</button>
  <button onclick="setMood(4)">🙂</button>
  <button onclick="setMood(5)">😄</button>
</div>

</div>

<!-- Music Player Section -->
<div class="glass p-6 mb-6">
<h2 class="text-2xl font-bold mb-4">🎵 Music Player</h2>
<div class="space-y-4">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <button onclick="playMusic('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3')" class="game-button bg-blue-400 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg">
      🎶 Calming Piano
    </button>
    <button onclick="playMusic('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3')" class="game-button bg-purple-400 hover:bg-purple-500 text-white font-bold py-3 px-4 rounded-lg">
      🌊 Ocean Waves
    </button>
    <button onclick="playMusic('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3')" class="game-button bg-green-400 hover:bg-green-500 text-white font-bold py-3 px-4 rounded-lg">
      🌿 Forest Sounds
    </button>
    <button onclick="playMusic('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3')" class="game-button bg-orange-400 hover:bg-orange-500 text-white font-bold py-3 px-4 rounded-lg">
      🎹 Uplifting Beats
    </button>
  </div>
  <div class="flex gap-2">
    <button onclick="document.getElementById('audioPlayer').pause()" class="flex-1 bg-red-400 hover:bg-red-500 text-white font-bold py-2 px-4 rounded">
      ⏸ Pause
    </button>
    <button onclick="stopMusic()" class="flex-1 bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 px-4 rounded">
      ⏹ Stop
    </button>
  </div>
  <audio id="audioPlayer" style="width: 100%;"></audio>
</div>
</div>

<!-- Games & Activities Section -->
<div class="glass p-6 mb-6">
<h2 class="text-2xl font-bold mb-4">🎮 Refresh Your Mood</h2>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
  <button onclick="startColorGame()" class="game-button bg-gradient-to-r from-red-400 to-pink-400 hover:from-red-500 hover:to-pink-500 text-white font-bold py-3 px-4 rounded-lg">
    🎨 Color Clicker
  </button>
  <button onclick="startMemoryGame()" class="game-button bg-gradient-to-r from-blue-400 to-cyan-400 hover:from-blue-500 hover:to-cyan-500 text-white font-bold py-3 px-4 rounded-lg">
    🧠 Memory Game
  </button>
  <button onclick="showQuote()" class="game-button bg-gradient-to-r from-yellow-400 to-orange-400 hover:from-yellow-500 hover:to-orange-500 text-white font-bold py-3 px-4 rounded-lg">
    💡 Daily Quote
  </button>
</div>

<!-- Color Clicker Game -->
<div id="colorGame" class="hidden bg-white bg-opacity-40 p-6 rounded-lg mb-4">
  <h3 class="text-xl font-bold mb-4">Click the Colors Fast! 🎨</h3>
  <div id="colorBoxes" class="grid grid-cols-4 gap-3 mb-4">
    <!-- Generated by JavaScript -->
  </div>
  <div class="flex justify-between items-center">
    <p class="text-lg font-bold">Score: <span id="colorScore">0</span></p>
    <button onclick="endColorGame()" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded">
      End Game
    </button>
  </div>
</div>

<!-- Memory Game -->
<div id="memoryGame" class="hidden bg-white bg-opacity-40 p-6 rounded-lg mb-4">
  <h3 class="text-xl font-bold mb-4">Memory Match Game 🧠</h3>
  <div id="memoryCards" class="grid grid-cols-4 gap-2 mb-4">
    <!-- Generated by JavaScript -->
  </div>
  <div class="flex justify-between items-center">
    <p class="text-lg font-bold">Matches: <span id="matchCount">0</span>/8</p>
    <button onclick="endMemoryGame()" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded">
      End Game
    </button>
  </div>
</div>

<!-- Quote Display -->
<div id="quoteDisplay" class="hidden bg-white bg-opacity-40 p-6 rounded-lg text-center mb-4">
  <p id="quoteText" class="text-lg font-bold mb-4"></p>
  <button onclick="document.getElementById('quoteDisplay').classList.add('hidden')" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded">
    Close
  </button>
</div>

<!-- Breathing Exercise -->
<div class="bg-white bg-opacity-40 p-6 rounded-lg">
  <h3 class="text-xl font-bold mb-4">🫁 Breathing Exercise</h3>
  <button onclick="startBreathingExercise()" class="w-full bg-gradient-to-r from-teal-400 to-green-400 hover:from-teal-500 hover:to-green-500 text-white font-bold py-3 px-4 rounded-lg">
    Start 2-Minute Breathing
  </button>
  <div id="breathingGuide" class="hidden text-center mt-6">
    <div id="breathingCircle" class="mx-auto w-32 h-32 bg-gradient-to-r from-blue-300 to-green-300 rounded-full flex items-center justify-center text-2xl font-bold transition-all duration-4000">
      Breathe
    </div>
    <p id="breathingText" class="mt-4 text-lg font-bold"></p>
  </div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDNptTXPybcivbPxar25J8Bcq6JJj0b7LU",
  authDomain: "stressguard-a191b.firebaseapp.com",
  projectId: "stressguard-a191b",
  storageBucket: "stressguard-a191b.firebasestorage.app",
  messagingSenderId: "1031149983572",
  appId: "1:1031149983572:web:6be50ee970a90fc1e99ac1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function setMood(val){

  await addDoc(collection(db, "moods"), {
    value: val,
    time: new Date()
  });

  alert("Mood saved: " + val);
}

window.setMood = setMood;

</script>

<script>
// Music Player
function playMusic(url) {
  const audio = document.getElementById('audioPlayer');
  audio.src = url;
  audio.play();
}

function stopMusic() {
  const audio = document.getElementById('audioPlayer');
  audio.pause();
  audio.currentTime = 0;
}

// Color Clicker Game
let colorScore = 0;
let colorGameActive = false;

function startColorGame() {
  colorScore = 0;
  colorGameActive = true;
  document.getElementById('colorGame').classList.remove('hidden');
  document.getElementById('colorScore').textContent = '0';
  
  const boxesContainer = document.getElementById('colorBoxes');
  boxesContainer.innerHTML = '';
  
  const colors = ['red', 'blue', 'green', 'yellow', 'purple', 'pink', 'orange', 'cyan'];
  
  for (let i = 0; i < 16; i++) {
    const box = document.createElement('div');
    const color = colors[Math.floor(Math.random() * colors.length)];
    box.className = `color-box w-full bg-${color}-400 p-6 rounded cursor-pointer`;
    box.style.backgroundColor = ['red', 'blue', 'green', 'yellow', 'purple', 'pink', 'orange', 'cyan'][Math.floor(Math.random() * 8)];
    box.onclick = () => {
      if (colorGameActive) {
        colorScore++;
        document.getElementById('colorScore').textContent = colorScore;
        box.style.backgroundColor = ['red', 'blue', 'green', 'yellow', 'purple', 'pink', 'orange', 'cyan', 'indigo'][Math.floor(Math.random() * 9)];
      }
    };
    boxesContainer.appendChild(box);
  }
  
  setTimeout(() => {
    if (colorGameActive) {
      alert(`Game Over! Your score: ${colorScore}`);
      endColorGame();
    }
  }, 30000);
}

function endColorGame() {
  colorGameActive = false;
  document.getElementById('colorGame').classList.add('hidden');
}

// Memory Game
let memoryCards = [];
let firstCard = null;
let secondCard = null;
let lockBoard = false;
let matches = 0;

function startMemoryGame() {
  matches = 0;
  memoryCards = [];
  firstCard = null;
  secondCard = null;
  lockBoard = false;
  
  document.getElementById('memoryGame').classList.remove('hidden');
  document.getElementById('matchCount').textContent = '0';
  
  const symbols = ['🎈', '🎉', '🎁', '🎊', '🎮', '⚽', '🎪', '🎨'];
  const gameSymbols = [...symbols, ...symbols];
  
  gameSymbols.sort(() => Math.random() - 0.5);
  
  const cardsContainer = document.getElementById('memoryCards');
  cardsContainer.innerHTML = '';
  
  gameSymbols.forEach((symbol, index) => {
    const card = document.createElement('div');
    card.className = 'bg-white bg-opacity-60 w-full p-4 rounded text-3xl text-center cursor-pointer hover:bg-opacity-80 transition';
    card.textContent = '❓';
    card.dataset.symbol = symbol;
    card.dataset.flipped = false;
    card.onclick = () => flipCard(card);
    cardsContainer.appendChild(card);
    memoryCards.push(card);
  });
}

function flipCard(card) {
  if (lockBoard || card.dataset.flipped === 'true' || firstCard === card) return;
  
  card.textContent = card.dataset.symbol;
  card.dataset.flipped = 'true';
  
  if (!firstCard) {
    firstCard = card;
  } else {
    secondCard = card;
    lockBoard = true;
    
    if (firstCard.dataset.symbol === secondCard.dataset.symbol) {
      matches++;
      document.getElementById('matchCount').textContent = matches;
      firstCard = null;
      secondCard = null;
      lockBoard = false;
      
      if (matches === 8) {
        setTimeout(() => {
          alert('🎉 You won! All matches found!');
          endMemoryGame();
        }, 500);
      }
    } else {
      setTimeout(() => {
        firstCard.textContent = '❓';
        firstCard.dataset.flipped = 'false';
        secondCard.textContent = '❓';
        secondCard.dataset.flipped = 'false';
        firstCard = null;
        secondCard = null;
        lockBoard = false;
      }, 800);
    }
  }
}

function endMemoryGame() {
  document.getElementById('memoryGame').classList.add('hidden');
}

// Daily Quote
const quotes = [
  "The only way to do great work is to love what you do. - Steve Jobs",
  "Believe you can and you're halfway there. - Theodore Roosevelt",
  "It is during our darkest moments that we must focus to see the light. - Aristotle",
  "The best time to plant a tree was 20 years ago. The second best time is now. - Chinese Proverb",
  "Your time is limited, don't waste it living someone else's life. - Steve Jobs",
  "The future belongs to those who believe in the beauty of their dreams. - Eleanor Roosevelt",
  "You miss 100% of the shots you don't take. - Wayne Gretzky",
  "Whether you think you can or think you can't – you're right. - Henry Ford",
  "Happiness is not something ready made. It comes from your own actions. - Dalai Lama",
  "Success is not final, failure is not fatal: it is the courage to continue that counts. - Winston Churchill"
];

function showQuote() {
  const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
  document.getElementById('quoteText').textContent = randomQuote;
  document.getElementById('quoteDisplay').classList.remove('hidden');
}

// Breathing Exercise
function startBreathingExercise() {
  const guide = document.getElementById('breathingGuide');
  const circle = document.getElementById('breathingCircle');
  const text = document.getElementById('breathingText');
  
  guide.classList.remove('hidden');
  
  let phase = 0;
  let count = 0;
  const totalCycles = 4;
  
  const phases = [
    { name: 'Inhale', duration: 4, color: 'from-blue-300 via-blue-200 to-green-300' },
    { name: 'Hold', duration: 4, color: 'from-green-300 to-green-400' },
    { name: 'Exhale', duration: 4, color: 'from-green-300 via-blue-200 to-blue-300' },
    { name: 'Hold', duration: 4, color: 'from-blue-300 to-blue-400' }
  ];
  
  function animatePhase() {
    const currentPhase = phases[phase % phases.length];
    circle.textContent = currentPhase.name;
    circle.className = `mx-auto w-32 h-32 bg-gradient-to-r ${currentPhase.color} rounded-full flex items-center justify-center text-2xl font-bold transition-all duration-4000`;
    
    let timer = currentPhase.duration;
    const interval = setInterval(() => {
      timer--;
      
      if (timer <= 0) {
        clearInterval(interval);
        phase++;
        
        if (count < totalCycles) {
          if (phase % 4 === 0) count++;
          if (count < totalCycles) {
            animatePhase();
          } else {
            text.textContent = '✅ Great job! You completed the breathing exercise.';
            setTimeout(() => {
              guide.classList.add('hidden');
            }, 2000);
          }
        }
      }
    }, 1000);
  }
  
  animatePhase();
}
</script>

</body>
</html>
