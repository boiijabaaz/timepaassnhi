<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Assistant</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  --bg-a: #667eea;
    --bg-b: #764ba2;
      background: linear-gradient(135deg, var(--bg-a) 0%, var(--bg-b) 100%);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          min-height: 100vh;
            display: flex;
              align-items: center;
                justify-content: center;
                  padding: 20px;
                    position: relative;
                      overflow: hidden;
                      }
                      
                      /* soft abstract background blobs (keeps glass visible) */
                      body::before {
                        /* photographic background - change the URL if you want a different photo */
                          content: '';
                            position: absolute;
                              inset: 0;
                                background-image: url('https://images.unsplash.com/photo-1503264116251-35a269479413?auto=format&fit=crop&w=2000&q=80');
                                  background-size: cover;
                                    background-position: center center;
                                      filter: blur(6px) brightness(0.55) saturate(105%);
                                        transform: scale(1.03);
                                          opacity: 1;
                                            z-index: 0;
                                              pointer-events: none;
                                              }
                                              
                                              /* soft color overlay to keep contrast while preserving glass effect */
                                              body::after {
                                                content: '';
                                                  position: absolute;
                                                    inset: 0;
                                                      background: linear-gradient(180deg, rgba(118,75,162,0.18), rgba(102,126,234,0.14));
                                                        mix-blend-mode: multiply;
                                                          z-index: 0;
                                                            pointer-events: none;
                                                            }
                                                            
                                                            .container {
                                                              width: 100%;
                                                                max-width: 700px;
                                                                  height: 90vh;
                                                                    max-height: 600px;
                                                                      display: flex;
                                                                        flex-direction: column;
                                                                        }
                                                                        
                                                                        .glass-card {
                                                                          background: rgba(255, 255, 255, 0.12);
                                                                            backdrop-filter: blur(8px);
                                                                              border-radius: 20px;
                                                                                border: 1px solid rgba(255, 255, 255, 0.16);
                                                                                  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
                                                                                    display: flex;
                                                                                      flex-direction: column;
                                                                                        height: 100%;
                                                                                          overflow: hidden;
                                                                                            position: relative;
                                                                                              z-index: 1;
                                                                                              }
                                                                                              
                                                                                              .header {
                                                                                                padding: 20px 24px;
                                                                                                  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
                                                                                                    flex-shrink: 0;
                                                                                                    }
                                                                                                    
                                                                                                    .header h1 { font-size: 18px; font-weight: 600; color: white; margin: 0; }
                                                                                                    .header p { font-size: 13px; color: rgba(255,255,255,0.78); margin-top: 6px; }
                                                                                                    
                                                                                                    .chatbox { flex: 1; overflow-y: auto; padding: 18px 22px; scroll-behavior: smooth; display:flex; flex-direction:column; gap:12px; }
                                                                                                    
                                                                                                    .chatbox::-webkit-scrollbar { width: 6px; }
                                                                                                    .chatbox::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 6px; }
                                                                                                    
                                                                                                    .message-wrapper { display:flex; animation: messageSlide 0.28s ease-out; }
                                                                                                    @keyframes messageSlide { from { opacity:0; transform:translateY(8px);} to { opacity:1; transform:translateY(0);} }
                                                                                                    
                                                                                                    .user-message { justify-content: flex-end; }
                                                                                                    .user-bubble { background: linear-gradient(135deg,#e3d8ff,#d4c3ff); color:#0f172a; padding:10px 14px; border-radius:12px; max-width:80%; font-size:14px; box-shadow: 0 6px 18px rgba(99,67,255,0.06); }
                                                                                                    
                                                                                                    .bot-message { justify-content: flex-start; }
                                                                                                    .bot-bubble { background: rgba(255,255,255,0.08); color: #fff; padding:10px 14px; border-radius:12px; max-width:80%; font-size:14px; border:1px solid rgba(255,255,255,0.06); backdrop-filter: blur(4px); }
                                                                                                    
                                                                                                    .typing-indicator { display:flex; align-items:center; gap:6px; padding:8px 12px; }
                                                                                                    .typing-dot { width:6px; height:6px; border-radius:50%; background: rgba(255,255,255,0.65); animation: typingBounce 1.4s infinite; }
                                                                                                    .typing-dot:nth-child(2){ animation-delay:0.2s; } .typing-dot:nth-child(3){ animation-delay:0.4s; }
                                                                                                    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0);} 30%{transform:translateY(-8px);} }
                                                                                                    
                                                                                                    .input-section { padding:16px 22px; border-top:1px solid rgba(255,255,255,0.04); display:flex; gap:10px; align-items:center; }
                                                                                                    #msg { flex:1; padding:8px 10px; border-radius:8px; border:1.2px solid rgba(0,0,0,0.35); background: #fff; color:#111827; font-size:14px; outline:none; }
                                                                                                    #msg::placeholder{ color: #8b8b8b; }
                                                                                                    #msg:focus{ box-shadow:0 6px 20px rgba(99,67,255,0.06); border-color: rgba(99,67,255,0.28); }
                                                                                                    .send-btn { padding:8px 12px; border-radius:8px; background:transparent; border: none; cursor:pointer; color:#0f172a; font-weight:600; font-size:14px; }
                                                                                                    .send-btn:hover{ background: rgba(0,0,0,0.04); }
                                                                                                    </style>
                                                                                                    </head>
                                                                                                    
                                                                                                    <body>
                                                                                                    
                                                                                                    <div class="container">
                                                                                                      <div class="glass-card">
                                                                                                          <div class="header">
                                                                                                                <div style="display:flex;align-items:center;gap:12px">
                                                                                                                        <div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(90deg,#fff,#f3e8ff);display:flex;align-items:center;justify-content:center;color:#4b4b57">💬</div>
                                                                                                                                <div>
                                                                                                                                          <div style="font-weight:600;color:#0b0b0f">Chat Assistant</div>
                                                                                                                                                    <div style="font-size:13px;color:rgba(11,11,15,0.6);margin-top:4px">I'm here to help you anytime</div>
                                                                                                                                                            </div>
                                                                                                                                                                  </div>
                                                                                                                                                                      </div>
                                                                                                                                                                      
                                                                                                                                                                          <div id="chatbox" class="chatbox" aria-live="polite"></div>
                                                                                                                                                                          
                                                                                                                                                                              <div class="input-section">
                                                                                                                                                                                    <input id="msg" type="text" placeholder="Type your message..." autocomplete="off">
                                                                                                                                                                                          <button id="sendBtn" class="send-btn">Send</button>
                                                                                                                                                                                              </div>
                                                                                                                                                                                                </div>
                                                                                                                                                                                                </div>
                                                                                                                                                                                                
                                                                                                                                                                                                <script>
                                                                                                                                                                                                let isTyping = false;
                                                                                                                                                                                                
                                                                                                                                                                                                async function send(){
                                                                                                                                                                                                  const msgInput = document.getElementById('msg');
                                                                                                                                                                                                    const text = msgInput.value.trim();
                                                                                                                                                                                                      if (!text) return;
                                                                                                                                                                                                      
                                                                                                                                                                                                        // user bubble
                                                                                                                                                                                                          const u = document.createElement('div');
                                                                                                                                                                                                            u.className = 'message-wrapper user-message';
                                                                                                                                                                                                              u.innerHTML = `<div class="user-bubble">${escapeHtml(text)}</div>`;
                                                                                                                                                                                                                document.getElementById('chatbox').appendChild(u);
                                                                                                                                                                                                                  msgInput.value = '';
                                                                                                                                                                                                                    msgInput.focus();
                                                                                                                                                                                                                      scrollToBottom();
                                                                                                                                                                                                                      
                                                                                                                                                                                                                        showTypingIndicator();
                                                                                                                                                                                                                        
                                                                                                                                                                                                                          try {
                                                                                                                                                                                                                              const resp = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({message:text}) });
                                                                                                                                                                                                                                  if (!resp.ok) throw new Error('Network error');
                                                                                                                                                                                                                                      const data = await resp.json();
                                                                                                                                                                                                                                          const reply = data.reply || 'No response';
                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                              hideTypingIndicator();
                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                  const b = document.createElement('div');
                                                                                                                                                                                                                                                      b.className = 'message-wrapper bot-message';
                                                                                                                                                                                                                                                          b.innerHTML = `<div class="bot-bubble">${escapeHtml(reply)}</div>`;
                                                                                                                                                                                                                                                              setTimeout(()=>{ document.getElementById('chatbox').appendChild(b); scrollToBottom(); }, 200);
                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                } catch (err) {
                                                                                                                                                                                                                                                                    hideTypingIndicator();
                                                                                                                                                                                                                                                                        const e = document.createElement('div');
                                                                                                                                                                                                                                                                            e.className = 'message-wrapper bot-message';
                                                                                                                                                                                                                                                                                e.innerHTML = `<div class="bot-bubble">⚠️ ${escapeHtml(err.message)}</div>`;
                                                                                                                                                                                                                                                                                    document.getElementById('chatbox').appendChild(e);
                                                                                                                                                                                                                                                                                        scrollToBottom();
                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                          function showTypingIndicator(){
                                                                                                                                                                                                                                                                                            if (isTyping) return; isTyping=true;
                                                                                                                                                                                                                                                                                              const t = document.createElement('div');
                                                                                                                                                                                                                                                                                                t.id = 'typing-indicator';
                                                                                                                                                                                                                                                                                                  t.className = 'message-wrapper bot-message';
                                                                                                                                                                                                                                                                                                    t.innerHTML = `<div class="bot-bubble" style="padding:8px 12px;"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
                                                                                                                                                                                                                                                                                                      document.getElementById('chatbox').appendChild(t);
                                                                                                                                                                                                                                                                                                        scrollToBottom();
                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                        function hideTypingIndicator(){
                                                                                                                                                                                                                                                                                                          const t = document.getElementById('typing-indicator'); if (t) t.remove(); isTyping=false;
                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                          function scrollToBottom(){ const c=document.getElementById('chatbox'); setTimeout(()=>{ c.scrollTop = c.scrollHeight; },60); }
                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                          function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                          document.getElementById('sendBtn').addEventListener('click', send);
                                                                                                                                                                                                                                                                                                          document.getElementById('msg').addEventListener('keypress', (e)=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
                                                                                                                                                                                                                                                                                                          document.addEventListener('DOMContentLoaded', ()=>{ document.getElementById('msg').focus(); });
                                                                                                                                                                                                                                                                                                          </script>
                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                          </body>
                                                                                                                                                                                                                                                                                                          </html>
