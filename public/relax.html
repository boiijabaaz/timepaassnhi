<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Relax & Breathe - Mindo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
  background-attachment: fixed;
  color: white;
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  display: flex;
  flex-direction: column;
}


.content-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 2rem;
}

.header-section {
  text-align: center;
  margin-bottom: 3rem;
  animation: fadeInDown 0.8s ease-out;
}

.header-title {
  font-size: 3.5rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 0.5rem;
  background: linear-gradient(135deg, #ffffff 0%, #e9d5ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-subtitle {
  font-size: 1.125rem;
  opacity: 0.9;
  font-weight: 300;
  letter-spacing: 0.025em;
}

.circle {
  width: 240px;
  height: 240px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.4), rgba(124, 58, 237, 0.8));
  transition: transform 4s cubic-bezier(0.4, 0.0, 0.2, 1);
  box-shadow: 0 0 80px rgba(124, 58, 237, 0.8), 0 0 120px rgba(240, 147, 251, 0.4), inset 0 0 40px rgba(255, 255, 255, 0.2);
  border: 2px solid rgba(255, 255, 255, 0.2);
  margin-bottom: 3rem;
  animation: fadeInScale 1s ease-out;
}

@keyframes fadeInDown {
  from {
    opacity: 0;
    transform: translateY(-30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeInScale {
  from {
    opacity: 0;
    transform: scale(0.9);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

@keyframes pulse-glow {
  0%, 100% {
    box-shadow: 0 0 80px rgba(124, 58, 237, 0.8), 0 0 120px rgba(240, 147, 251, 0.4), inset 0 0 40px rgba(255, 255, 255, 0.2);
  }
  50% {
    box-shadow: 0 0 100px rgba(124, 58, 237, 1), 0 0 150px rgba(240, 147, 251, 0.6), inset 0 0 50px rgba(255, 255, 255, 0.3);
  }
}

.circle.breathing {
  animation: pulse-glow 2s ease-in-out infinite;
}

.status-container {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.25);
  border-radius: 24px;
  padding: 2rem;
  min-width: 280px;
  margin-bottom: 2.5rem;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
}

#status {
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 1rem;
  letter-spacing: 0.025em;
}

#timer {
  font-size: 3rem;
  font-weight: 300;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.05em;
  opacity: 0.95;
}

.controls-section {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  align-items: center;
  animation: fadeInUp 0.8s ease-out 0.2s both;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.tempo-buttons {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
}

.btn {
  padding: 0.75rem 1.5rem;
  border: none;
  border-radius: 12px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  letter-spacing: 0.5px;
}

.btn-tempo {
  background: rgba(255, 255, 255, 0.15);
  border: 1.5px solid rgba(255, 255, 255, 0.3);
  color: white;
}

.btn-tempo:hover {
  background: rgba(255, 255, 255, 0.25);
  border-color: rgba(255, 255, 255, 0.5);
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
  transform: translateY(-2px);
}

.btn-tempo.selected {
  background: rgba(255, 255, 255, 0.3);
  border-color: rgba(255, 255, 255, 0.6);
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
}

.action-buttons {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-start {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  box-shadow: 0 8px 20px rgba(102, 126, 234, 0.35);
  padding: 0.875rem 2rem;
  font-size: 1rem;
}

.btn-start:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 30px rgba(102, 126, 234, 0.45);
}

.btn-start:active {
  transform: translateY(-1px);
}

.btn-stop {
  background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
  color: white;
  box-shadow: 0 8px 20px rgba(245, 87, 108, 0.35);
  padding: 0.875rem 2rem;
  font-size: 1rem;
}

.btn-stop:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 30px rgba(245, 87, 108, 0.45);
}

.btn-stop:active {
  transform: translateY(-1px);
}

@media (max-width: 640px) {
  .header-title {
    font-size: 2.5rem;
  }
  
  .circle {
    width: 180px;
    height: 180px;
  }
  
  .content-wrapper {
    padding: 1rem;
  }
}
</style>
</head>

<body>

<div class="content-wrapper">
  
  <div class="header-section">
    <h1 class="header-title">Relax & Breathe</h1>
    <p class="header-subtitle">Find calm through guided breathing</p>
  </div>

  <div id="circle" class="circle"></div>

  <div class="status-container">
    <h2 id="status">Ready</h2>
    <p id="timer">0s</p>
  </div>

  <div class="controls-section">
    <div class="tempo-buttons">
      <button onclick="selectTempo(4, this)" class="btn btn-tempo selected">⚡ Fast (4s)</button>
      <button onclick="selectTempo(6, this)" class="btn btn-tempo">🌬️ Normal (6s)</button>
    </div>

    <div class="action-buttons">
      <button onclick="startBreathing()" class="btn btn-start">▶ Start</button>
      <button onclick="stopBreathing()" class="btn btn-stop">⏹ Stop</button>
    </div>
  </div>

</div>

<script>
let duration = 4;
let running = false;
let timeoutId;
let countdownId;

function selectTempo(t, button) {
  duration = t;
  // Remove selected class from all tempo buttons
  document.querySelectorAll('.btn-tempo').forEach(btn => btn.classList.remove('selected'));
  // Add selected class to clicked button
  button.classList.add('selected');
}

function startBreathing(){
  if(running) return;
  running = true;

  const circle = document.getElementById("circle");
  const status = document.getElementById("status");
  const timer = document.getElementById("timer");

  circle.classList.add('breathing');
  let inhale = true;
  let timeLeft = duration;

  function cycle(){
    if(!running) return;

    timeLeft = duration;

    if(inhale){
      circle.style.transform = "scale(1.5)";
      status.innerText = "🫁 Breathe In";
    } else {
      circle.style.transform = "scale(1)";
      status.innerText = "🌬️ Breathe Out";
    }

    inhale = !inhale;

    clearInterval(countdownId);
    countdownId = setInterval(() => {
      if(timeLeft >= 0){
        timer.innerText = timeLeft + "s";
        timeLeft--;
      }
    }, 1000);

    timeoutId = setTimeout(cycle, duration * 1000);
  }

  cycle();
}

function stopBreathing(){
  running = false;
  clearTimeout(timeoutId);
  clearInterval(countdownId);

  const circle = document.getElementById("circle");
  circle.classList.remove('breathing');
  circle.style.transform = "scale(1)";
  document.getElementById("status").innerText = "Ready";
  document.getElementById("timer").innerText = "0s";
}
</script>

</body>
</html>
